<script>
    const APP_STATE = {
        baseTx: 35086,
        baseFt: 2836,
        baseLabel: "2/26 04:59 封關",
        currentFt: 0,
        nextUpdate: 15,
        isFetching: false,
        proxies: [
            "https://corsproxy.io/?url=",
            "https://api.allorigins.win/get?url=",
            "https://api.codetabs.com/v1/proxy?quest="
        ],
        proxyIdx: 0
    };

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.classList.toggle('hidden');
        if (!panel.classList.contains('hidden')) {
            document.getElementById('input-base-tx').value = APP_STATE.baseTx;
            document.getElementById('input-base-ft').value = APP_STATE.baseFt;
            const dateMatch = APP_STATE.baseLabel.match(/(\d+)\/(\d+)/);
            if (dateMatch) {
                const year = new Date().getFullYear();
                const month = dateMatch[1].padStart(2, '0');
                const day = dateMatch[2].padStart(2, '0');
                document.getElementById('input-base-date').value = `${year}-${month}-${day}`;
            }
        }
    }

    async function saveSettings() {
        if (!window.firebaseTools) return;
        const { db, appId, doc, setDoc } = window.firebaseTools;
        const newTx = parseFloat(document.getElementById('input-base-tx').value);
        const newFt = parseFloat(document.getElementById('input-base-ft').value);
        const dateVal = document.getElementById('input-base-date').value;

        if (isNaN(newTx) || isNaN(newFt) || !dateVal) {
            alert("請輸入有效的基準數值並選擇日期！");
            return;
        }

        const dateParts = dateVal.split('-');
        const formattedDate = `${parseInt(dateParts[1])}/${parseInt(dateParts[2])}`;
        const newLabel = `${formattedDate} 04:59 封關`;

        try {
            const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'simulation');
            await setDoc(settingsDoc, {
                baseTx: newTx,
                baseFt: newFt,
                baseLabel: newLabel,
                updatedAt: Date.now()
            });
            toggleSettings();
        } catch (e) { console.error("Save Error:", e); }
    }

    async function initStats() {
        if (!window.firebaseTools) return;
        const { db, auth, appId, increment, doc, setDoc, collection, onSnapshot, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.firebaseTools;
        
        try {
            // 自訂 Firebase 配置時，環境提供的 __initial_auth_token 通常會 mismatch
            // 因此強制優先使用匿名登入
            await signInAnonymously(auth).catch(e => {
                console.error("Anonymous Auth Fail:", e);
            });

            onAuthStateChanged(auth, async (user) => {
                if (!user) return;

                // 1. 基準設定同步 (RULE 1 Path)
                const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'simulation');
                onSnapshot(settingsDoc, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        APP_STATE.baseTx = data.baseTx;
                        APP_STATE.baseFt = data.baseFt;
                        APP_STATE.baseLabel = data.baseLabel;
                        if (APP_STATE.currentFt > 0) calculateResults(APP_STATE.currentFt);
                    }
                }, (err) => console.error("Settings Sync Fail (Check Rules):", err));

                // 2. 統計數據邏輯 (RULE 1 Path)
                const now = new Date();
                const dateKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                
                const globalStatsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'global');
                const dailyStatsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'dailyStats', dateKey);
                const presenceDoc = doc(db, 'artifacts', appId, 'public', 'data', 'presence', user.uid);

                // 更新數據 (加上簡單錯誤處理)
                try {
                    await setDoc(globalStatsDoc, { totalViews: increment(1) }, { merge: true });
                    await setDoc(dailyStatsDoc, { count: increment(1) }, { merge: true });
                } catch (e) { console.warn("Firestore write skipped:", e.message); }

                onSnapshot(globalStatsDoc, (snap) => {
                    if (snap.exists()) document.getElementById('total-views').innerText = snap.data().totalViews?.toLocaleString() || '0';
                }, (err) => console.error("Global Stats Fail:", err));

                onSnapshot(dailyStatsDoc, (snap) => {
                    if (snap.exists()) document.getElementById('today-views').innerText = snap.data().count?.toLocaleString() || '0';
                }, (err) => console.error("Daily Stats Fail:", err));

                // 在線人數監控
                const updateActive = () => setDoc(presenceDoc, { lastActive: Date.now() }, { merge: true });
                updateActive();
                setInterval(updateActive, 60000);

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'presence'), (snap) => {
                    const activeNow = Date.now();
                    const activeCount = snap.docs.filter(d => (activeNow - (d.data().lastActive || 0)) < 300000).length;
                    document.getElementById('online-users').innerText = activeCount || '1';
                }, (err) => console.error("Presence Listen Fail:", err));
            });
        } catch (e) { console.error("InitStats Error:", e); }
    }

    async function fetchWithRetry(url, retries = 5) {
        const proxyBase = APP_STATE.proxies[APP_STATE.proxyIdx % APP_STATE.proxies.length];
        const cacheBuster = (url.includes('?') ? '&' : '?') + 't=' + Date.now();
        const finalUrl = proxyBase + encodeURIComponent(url + cacheBuster);
        try {
            const res = await fetch(finalUrl);
            if (!res.ok) throw new Error(`HTTP_${res.status}`);
            let content = proxyBase.includes("allorigins") ? (await res.json()).contents : await res.text();
            return content;
        } catch (err) {
            if (retries > 0) {
                APP_STATE.proxyIdx++;
                await new Promise(r => setTimeout(r, 600));
                return fetchWithRetry(url, retries - 1);
            }
            throw err;
        }
    }

    function calculateResults(foundFt) {
        APP_STATE.currentFt = foundFt;
        const currentRatio = APP_STATE.baseTx / APP_STATE.baseFt;
        const txPrice = Math.round(foundFt * currentRatio);
        const diff = txPrice - APP_STATE.baseTx;
        const percent = ((foundFt / APP_STATE.baseFt) - 1) * 100;

        document.getElementById('futai-val').innerText = foundFt.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('tx-val').innerText = txPrice.toLocaleString();
        document.getElementById('base-display-label').innerText = `較 ${APP_STATE.baseLabel} (${APP_STATE.baseTx})`;

        const container = document.getElementById('diff-container');
        const display = document.getElementById('diff-display');
        const arrow = document.getElementById('diff-arrow');
        const points = document.getElementById('diff-points');
        const pctEl = document.getElementById('diff-percent');

        container.classList.remove('hidden');
        points.innerText = (diff > 0 ? "+" : "") + diff.toLocaleString();
        pctEl.innerText = `(${percent.toFixed(2)}%)`;

        if (diff > 0) { display.className = "flex items-center gap-2 font-mono font-black text-2xl up-trend"; arrow.innerHTML = "▲"; }
        else if (diff < 0) { display.className = "flex items-center gap-2 font-mono font-black text-2xl down-trend"; arrow.innerHTML = "▼"; }
        else { display.className = "flex items-center gap-2 font-mono font-black text-2xl text-slate-300"; arrow.innerHTML = ""; }
    }

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            if (!line.trim()) continue;
            const cells = [];
            let current = '', inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
                else current += char;
            }
            cells.push(current.trim()); rows.push(cells);
        }
        return rows;
    }

    async function syncData() {
        if (APP_STATE.isFetching) return;
        const GS_URL = "https://docs.google.com/spreadsheets/d/1Ysw95KCFw-sHDUntrzsg7zCWPsiAyIIHJ1Yg69pKuKk/export?format=csv&gid=884663985";
        const dot = document.getElementById('sync-dot');
        const futaiEl = document.getElementById('futai-val');

        APP_STATE.isFetching = true;
        dot.className = "w-2 h-2 rounded-full bg-amber-400 animate-ping";

        try {
            const rawText = await fetchWithRetry(GS_URL);
            const rows = parseCSV(rawText);
            let foundPrice = null;
            
            if (rows.length >= 3 && rows[2] && rows[2][5]) {
                const val = parseFloat(rows[2][5].replace(/[^\d.]/g, ''));
                if (!isNaN(val) && val > 1500 && val < 4000) foundPrice = val;
            }

            if (!foundPrice) {
                for (let r = 0; r < rows.length; r++) {
                    for (let c = 0; c < rows[r].length; c++) {
                        if (rows[r][c] && rows[r][c].includes("富台") && rows[r][c + 3]) {
                            const val = parseFloat(rows[r][c + 3].replace(/[^\d.]/g, ''));
                            if (!isNaN(val) && val > 1500 && val < 4000) { foundPrice = val; break; }
                        }
                    }
                    if (foundPrice) break;
                }
            }

            if (foundPrice) {
                calculateResults(foundPrice);
                document.getElementById('last-update-time').innerText = new Date().toLocaleTimeString('zh-TW', { hour12: false });
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-sm";
            } else { throw new Error("Value not found"); }
        } catch (err) {
            dot.className = "w-2 h-2 rounded-full bg-rose-500 shadow-sm";
            if (futaiEl.innerText.includes('...')) futaiEl.innerText = "偵測失敗";
        } finally {
            APP_STATE.isFetching = false;
            APP_STATE.nextUpdate = 15;
            document.getElementById('countdown').innerText = APP_STATE.nextUpdate;
        }
    }

    (function start() {
        syncData();
        setTimeout(initStats, 1500);
        setInterval(() => {
            if (!APP_STATE.isFetching) {
                APP_STATE.nextUpdate--;
                if (APP_STATE.nextUpdate <= 0) syncData();
                else document.getElementById('countdown').innerText = APP_STATE.nextUpdate;
            }
        }, 1000);
    })();
</script>
</body>
</html>
